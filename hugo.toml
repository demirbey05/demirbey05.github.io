baseURL = "https://demirbey05.github.io/"
languageCode = "en-us"
title = "demirbey05"
theme = "PaperMod"
[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "demirbey05"
  description = "Personal academic blog — research notes, projects, and technical writing."
  keywords = ["blog", "research", "academic", "computer science", "mathematics"]
  author = "demirbey05"
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"  # dark / light / auto
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  math = true

  [params.assets]
    # disableHLJS = true  # to disable highlight.js
    # disableFingerprinting = true
    # favicon = "<link / abs url>"
    # favicon16x16 = "<link / abs url>"
    # favicon32x32 = "<link / abs url>"
    # apple_touch_icon = "<link / abs url>"
    # safari_pinned_tab = "<link / abs url>"

  [params.label]
    text = "demirbey05"
    # icon = "/apple-touch-icon.png"
    # iconHeight = 35

  # Home page profile mode
  [params.profileMode]
    enabled = true
    title = "demirbey05"
    subtitle = "Researcher & Software Engineer — exploring mathematics and llms."
    imageUrl = ""
    imageWidth = 140
    imageHeight = 140
    imageTitle = ""

    [[params.profileMode.buttons]]
      name = "Blog"
      url = "posts"

    [[params.profileMode.buttons]]
      name = "Publications"
      url = "publications"

    [[params.profileMode.buttons]]
      name = "About"
      url = "about"

  # Social icons
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/demirbey05"


  # Search
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    # limit = 10
    keys = ["title", "permalink", "summary", "content"]

  [params.cover]
    hidden = true
    hiddenInList = true
    hiddenInSingle = true

# Menu
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "publications"
    name = "Publications"
    url = "/publications/"
    weight = 20

  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

# Outputs for search
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Markup settings (math + syntax highlighting)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allows raw HTML in markdown (useful for math, embeds)
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [["\\[", "\\]"], ["$$", "$$"]]
        inline = [["\\(", "\\)"], ["$", "$"]]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "dracula"
